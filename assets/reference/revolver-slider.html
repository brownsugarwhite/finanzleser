<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="only light">
<title>Revolver Slider</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&family=Merriweather:wght@700&display=swap" rel="stylesheet">
<style>
:root { --card:#F5F4F2; --border:rgba(0,0,0,0.07); --text:#1A1714; --muted:rgba(26,23,20,0.46); --gold:#B8913A; }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{margin:0;padding:0;background:#fff;color-scheme:only light;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
.scroll-wrap{height:300vh;}
.scene-wrap{position:sticky;bottom:0;width:100%;display:flex;justify-content:center;background:#fff;padding:16px 0;}
.scene{display:flex;flex-direction:column;align-items:center;gap:20px;}
.stage{position:relative;background:transparent;overflow:visible;touch-action:none;cursor:grab;}
.stage:active{cursor:grabbing;}
.card{position:absolute;top:0;left:0;background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.07),0 1px 3px rgba(0,0,0,0.04);will-change:transform,width,height;}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(148deg,rgba(255,255,255,.65) 0%,rgba(255,255,255,.15) 40%,transparent 65%);border-radius:inherit;pointer-events:none;}
.c-content{position:absolute;top:0;left:0;padding:25px 20px;display:flex;flex-direction:column;pointer-events:none;}
.c-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:10px;}
.t-title{font-family:'Merriweather',serif;font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.2px;line-height:1.2;margin-bottom:7px;}
.t-desc{font-size:12.5px;color:var(--muted);line-height:1.65;font-weight:400;}
.t-btn{margin-top:16px;display:inline-flex;align-items:center;gap:5px;padding:10px 16px;border:none;border-radius:9px;font-family:'Syne',sans-serif;font-size:11.5px;font-weight:700;color:#fff;cursor:pointer;align-self:flex-start;letter-spacing:.1px;}
.t-btn:active{transform:scale(.97);}
.sparkle{position:absolute;width:20px;height:20px;pointer-events:none;z-index:200;opacity:0.65;}
.dots{display:flex;align-items:center;gap:7px;}
.dot{height:4px;border-radius:2px;background:rgba(26,23,20,0.13);transition:width .38s cubic-bezier(.4,0,.2,1),background .38s cubic-bezier(.4,0,.2,1);}
.dot.on{width:22px;background:var(--gold);}
.dot:not(.on){width:5px;}
.drag-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;color:rgba(26,23,20,0.22);text-transform:uppercase;user-select:none;}
</style>
</head>
<body>
<div class="scroll-wrap">
<div style="height:200vh;"></div>
<div class="scene-wrap">
<div class="scene">
  <div class="stage" id="stage">
    <svg id="sparkle" class="sparkle" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L13.6 10.4L22 12L13.6 13.6L12 22L10.4 13.6L2 12L10.4 10.4Z" fill="#B8913A"/>
      <path d="M5 5L5.9 8.1L9 9L5.9 9.9L5 13L4.1 9.9L1 9L4.1 8.1Z" fill="#B8913A" opacity="0.45"/>
      <path d="M19 15L19.6 17.4L22 18L19.6 18.6L19 21L18.4 18.6L16 18L18.4 17.4Z" fill="#B8913A" opacity="0.35"/>
    </svg>
  </div>
  <div class="dots" id="dots">
    <div class="dot on"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="drag-label">← drag to rotate →</div>
</div>
</div>
<div style="height:100vh;"></div>
</div>
<script>
const DATA=[
  {title:'Smart Investing',desc:'Automatisch diversifizierte Portfolios, gesteuert von adaptiven Algorithmen, die Marktveränderungen in Echtzeit verarbeiten.',btn:'Jetzt starten',accent:'#B8913A',icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>`},
  {title:'Portfolio',desc:'Übersichtliche Aufteilung deiner Assets über alle Anlageklassen — Aktien, ETFs und Anleihen auf einen Blick.',btn:'Portfolio ansehen',accent:'#3A72C9',icon:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>`},
  {title:'Rendite',desc:'Verfolge deine Performance in Echtzeit. Historische Renditen, Benchmarks und Prognosen transparent visualisiert.',btn:'Rendite prüfen',accent:'#2EA868',icon:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`}
];
const W=Math.min(window.innerWidth-34,480),GAP=25,BW=(W-GAP)/2,BH=Math.round(BW*0.75);
let TH,SLOT,STAGE_H;
function recalcLayout(topH){
  TH=topH;STAGE_H=TH+GAP+BH;const BY=TH+GAP;
  SLOT=[[W/2,TH/2,W,TH],[BW+GAP+BW/2,BY+BH/2,BW,BH],[BW/2,BY+BH/2,BW,BH]];
  stageEl.style.height=STAGE_H+'px';
  sparkleEl.style.top=(TH+GAP/2-5)+'px';
  // intro: 3 equal cards in a row, centered vertically
  const iW=Math.round((W-4*GAP)/3);
  const iH=Math.round(iW*1.15);
  const iMargin=(W-(3*iW+2*GAP))/2;
  const iCy=STAGE_H/2;
  ISLOT=[0,1,2].map(i=>[iMargin+iW/2+i*(iW+GAP),iCy,iW,iH]);
}
const lerp=(a,b,t)=>a+(b-a)*t;
const sw=(t,a,b)=>{const x=Math.min(1,Math.max(0,(t-a)/(b-a)));return x*x*(3-2*x);};
function morph(from,to,t){
  const[fx,fy,fw,fh]=SLOT[from],[tx,ty,tw,th]=SLOT[to];
  if(from!==0&&to!==0){const s=sw(t,0,1);const sq=Math.sin(s*Math.PI);return{cx:lerp(fx,tx,s),cy:fy+(BH*0.06*sq),w:lerp(fw,tw,s)*(1+sq*0.16),h:fh*(1-sq*0.10)};}
  const midH=TH+BH*0.4,midCy=midH/2;
  if(from!==0){
    const hRise=sw(t,0.00,0.44),hFall=sw(t,0.47,0.92);
    const h=hFall>0?lerp(midH,th,hFall):lerp(fh,midH,hRise);
    const cy=hFall>0?lerp(midCy,ty,hFall):lerp(fy,midCy,hRise);
    return{cx:lerp(fx,tx,sw(t,0.68,1.00)),cy,w:lerp(fw,tw,sw(t,0.68,1.00)),h};
  }else{
    const w=lerp(fw,tw,sw(t,0.00,0.22)),cx=lerp(fx,tx,sw(t,0.00,0.22));
    const hRise=sw(t,0.18,0.52),hFall=sw(t,0.55,1.00);
    const h=hFall>0?lerp(midH,th,hFall):lerp(fh,midH,hRise);
    const cy=hFall>0?lerp(midCy,ty,hFall):lerp(fy,midCy,hRise);
    return{cx,cy,w,h};
  }
}
let order=[0,1,2],rot=0,vel=0,raf=null,sparkleRot=0;
let ISLOT,introMode=true,introP=1;
let dragging=false,x0=0,rotStart=0,samples=[],didDrag=false;
const DRAG_PX=W*1.6,CW_TO=[1,2,0],CCW_TO=[2,0,1];
const stageEl=document.getElementById('stage');
const dotsEl=document.getElementById('dots');
const sparkleEl=document.getElementById('sparkle');
stageEl.style.width=W+'px';
sparkleEl.style.left=(W/2-10)+'px';
const cards=DATA.map((d,ci)=>{
  const el=document.createElement('div');el.className='card';
  const c=document.createElement('div');c.className='c-content';c.style.width=W+'px';
  c.innerHTML=`<div class="c-icon" style="background:${d.accent}18"><span style="color:${d.accent}">${d.icon}</span></div><div class="t-title">${d.title}</div><div class="t-desc">${d.desc}</div><button class="t-btn" style="background:${d.accent}">${d.btn} →</button>`;
  el.appendChild(c);stageEl.appendChild(el);
  el.addEventListener('click',()=>{
    if(introMode){
      order=[ci,(ci+1)%3,(ci+2)%3];
      introTween();
    } else {
      const si=order.indexOf(ci);
      if(si===1) detentSnap(-1,0);
      else if(si===2) detentSnap(1,0);
    }
  });
  return{el,desc:c.querySelector('.t-desc'),btn:c.querySelector('.t-btn')};
});
function render(){
  if(introMode){
    cards.forEach((card,ci)=>{
      const[cx,cy,w,h]=ISLOT[ci];
      card.el.style.transform=`translate3d(${cx-w/2}px,${cy-h/2}px,0)`;
      card.el.style.width=w+'px';card.el.style.height=h+'px';
      card.el.style.zIndex=10;card.el.style.cursor='pointer';
      card.desc.style.opacity=0;card.btn.style.opacity=0;
      card.el.querySelector('.t-title').style.fontSize='16px';
    });
    sparkleEl.style.opacity=0;
    Array.from(dotsEl.children).forEach(d=>d.className='dot');
    return;
  }
  if(introP>0){
    const e=1-Math.pow(introP,3);
    cards.forEach((card,ci)=>{
      const si=order.indexOf(ci);
      const[fx,fy,fw,fh]=ISLOT[ci],[tx,ty,tw,th]=SLOT[si];
      const cx=lerp(fx,tx,e),cy=lerp(fy,ty,e),w=lerp(fw,tw,e),h=lerp(fh,th,e);
      card.el.style.transform=`translate3d(${cx-w/2}px,${cy-h/2}px,0)`;
      card.el.style.width=w+'px';card.el.style.height=h+'px';
      card.el.style.zIndex=si===0?15:10;
      const op=si===0?Math.pow(e,2):0;
      card.desc.style.opacity=op;card.btn.style.opacity=op;
      card.el.querySelector('.t-title').style.fontSize=(16+5*e*(si===0?1:0))+'px';
    });
    sparkleEl.style.opacity=e;
    sparkleEl.style.transform=`rotate(${sparkleRot}deg)`;
    Array.from(dotsEl.children).forEach((d,i)=>d.className='dot'+(i===order[0]?' on':''));
    return;
  }
  const t=Math.min(1,Math.abs(rot)),NEXT=rot>=0?CW_TO:CCW_TO;
  order.forEach((ci,si)=>{
    const ts=NEXT[si],{cx,cy,w,h}=morph(si,ts,t),card=cards[ci];
    card.el.style.transform=`translate3d(${cx-w/2}px,${cy-h/2}px,0)`;
    card.el.style.width=w+'px';card.el.style.height=h+'px';
    card.el.style.zIndex=(si===0&&ts===0)?10:si!==0?20:15;
    let op;
    if(si===0&&ts===0){op=1;}
    else if(si===0&&ts!==0){op=1-Math.pow(t,5);}
    else if(si!==0&&ts===0){op=Math.pow(t,2);}
    else{op=0;}
    card.desc.style.opacity=op;card.btn.style.opacity=op;
    let titleSize;
    if(si===0&&ts===0) titleSize=21;
    else if(si===0&&ts!==0) titleSize=21-5*t;
    else if(si!==0&&ts===0) titleSize=16+5*t;
    else titleSize=16;
    cards[ci].el.querySelector('.t-title').style.fontSize=titleSize+'px';
  });
  sparkleEl.style.opacity=1;
  sparkleEl.style.transform=`rotate(${sparkleRot+rot*120}deg)`;
  const active=order[0];
  Array.from(dotsEl.children).forEach((d,i)=>d.className='dot'+(i===active?' on':''));
}
function commit(cw){
  sparkleRot+=cw?120:-120;
  order=cw?[order[2],order[0],order[1]]:[order[1],order[2],order[0]];
}
function introTween(){
  cancelAnimationFrame(raf);
  introMode=false;rot=0;vel=0;
  let t0=null;const dur=700;
  (function step(ts){
    if(!t0)t0=ts;
    const p=Math.min(1,(ts-t0)/dur);
    introP=1-p;
    render();
    if(p<1)raf=requestAnimationFrame(step);
    else{introP=0;render();}
  })(performance.now());
}
function detentSnap(target,initVel=0){
  cancelAnimationFrame(raf);
  vel=initVel;
  let snapTo=target;
  (function step(){
    vel+=(snapTo-rot)*0.006;
    vel*=0.92;
    rot+=vel;
    if(rot>=1){commit(true);rot-=1;if(snapTo>=0.5)snapTo=Math.max(0,snapTo-1);}
    if(rot<=-1){commit(false);rot+=1;if(snapTo<=-0.5)snapTo=Math.min(0,snapTo+1);}
    render();
    if(Math.abs(snapTo-rot)<0.0008&&Math.abs(vel)<0.0008){
      rot=snapTo;
      if(Math.abs(snapTo)>0.98){commit(snapTo>0);rot=0;}
      return render();
    }
    raf=requestAnimationFrame(step);
  })();
}
stageEl.addEventListener('pointerdown',e=>{
  e.preventDefault();dragging=true;x0=e.clientX;
  rotStart=rot;samples=[];cancelAnimationFrame(raf);
  stageEl.setPointerCapture(e.pointerId);
},{passive:false});
stageEl.addEventListener('pointermove',e=>{
  if(!dragging||introMode)return;
  const now=Date.now();
  const dx=e.clientX-x0;
  if(Math.abs(dx)>6)didDrag=true;
  let newRot=rotStart+dx/DRAG_PX;
  // wrap during drag — keep order in sync, clear samples on wrap
  while(newRot>=1){commit(true);newRot-=1;rotStart-=1;samples=[];}
  while(newRot<=-1){commit(false);newRot+=1;rotStart+=1;samples=[];}
  rot=newRot;
  samples.push({t:now,p:rot});
  while(samples.length>1&&now-samples[0].t>80)samples.shift();
  render();
});
stageEl.addEventListener('pointerup',()=>{
  if(!dragging)return;dragging=false;if(!didDrag)return;
  let rv=0;
  if(samples.length>=2){const s0=samples[0],s1=samples[samples.length-1];rv=(s1.p-s0.p)/Math.max(s1.t-s0.t,1)*14;}
  samples=[];
  const projected=rot+rv*5;
  const snap=projected>=0.5?1:projected<=-0.5?-1:0;
  detentSnap(snap,Math.max(-0.012,Math.min(0.012,rv)));
});
stageEl.addEventListener('pointercancel',()=>{
  dragging=false;samples=[];
  detentSnap(Math.round(Math.max(-1,Math.min(1,rot))));
});
document.fonts.ready.then(()=>{
  const probe=document.createElement('div');
  probe.style.cssText=`position:fixed;visibility:hidden;pointer-events:none;top:0;left:0;width:${W}px;padding:25px 20px;box-sizing:border-box;`;
  document.body.appendChild(probe);let maxH=0;
  DATA.forEach(d=>{
    probe.innerHTML=`<div style="width:36px;height:36px;margin-bottom:10px;"></div><div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;letter-spacing:-.2px;line-height:1.2;margin-bottom:7px;">${d.title}</div><div style="font-family:'DM Sans',sans-serif;font-size:12.5px;line-height:1.65;">${d.desc}</div><button style="margin-top:16px;padding:10px 16px;font-family:'Syne',sans-serif;font-size:11.5px;font-weight:700;display:inline-flex;border:none;border-radius:9px;">${d.btn} →</button>`;
    maxH=Math.max(maxH,probe.scrollHeight);
  });
  document.body.removeChild(probe);
  recalcLayout(maxH);render();
});

// scroll trigger: at 200vh fire introTween
let scrollTriggered=false;
function onScroll(){
  if(scrollTriggered||!introMode)return;
  if(window.scrollY>=window.innerHeight*2){
    scrollTriggered=true;
    setTimeout(()=>{ if(introMode) introTween(); },120);
  }
}
window.addEventListener('scroll',onScroll,{passive:true});
</script>
</body>
</html>
