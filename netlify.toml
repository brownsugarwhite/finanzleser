[build]
  command = "npm run build"
  publish = ".next"

# Wärmt nach jedem Deploy die Hub-Seiten vor (Landing, Haupt-/Subkategorien, Tool-
# Übersichten — Standard; WARM_FULL=true würde die ganze Sitemap wärmen), damit die
# meistbesuchten Einstiege beim ersten echten Besuch schnell sind.
# Abschalten via Env WARM_CACHE=false. Concurrency via WARM_CONCURRENCY.
[[plugins]]
  package = "/netlify/plugins/warm-cache"

[build.environment]
  # 22 (LTS): Netlify verlangt für Build-Plugins Node >= 22 — sonst wird das
  # warm-cache-Plugin übersprungen (Post-Deploy-Warming läuft dann nicht).
  NODE_VERSION = "22"
  # LEO-Backend des Kunden (RAG-Service auf Heroku). /api/chat proxyt darauf.
  # Gilt für alle Kontexte (Staging, Previews, Production) — ein einziges Backend.
  # Falls der Kunde später eine separate Prod-URL liefert: in [context.production.environment] überschreiben.
  LEO_BACKEND_URL = "https://leo-finanzleser-ea7e1549925c.herokuapp.com"

# Production-Site (deployt vom main-Branch, später)
[context.production.environment]
  NEXT_PUBLIC_SITE_URL = "https://www.finanzleser.de"
  # WORDPRESS_API_URL wird im Netlify-UI gesetzt (Production-WP-Endpoint)

# Staging-Site (deployt vom staging-Branch)
[context.staging.environment]
  NEXT_PUBLIC_SITE_URL = "https://staging.finanzleser.de"
  WORDPRESS_API_URL = "https://staging.finanzleser.de/graphql"

# Deploy-Previews und Branch-Deploys
[context.deploy-preview.environment]
  WORDPRESS_API_URL = "https://staging.finanzleser.de/graphql"
  NEXT_PUBLIC_SITE_URL = "https://staging.finanzleser.de"

# Hinweis: noindex-Header für Staging wird in next.config.ts gesetzt
# (env-basiert über NEXT_PUBLIC_SITE_URL — funktioniert verlässlich
# bei Next.js SSR, anders als ein netlify.toml [[headers]] Block).
