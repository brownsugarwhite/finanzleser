<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Newsletter illustration: animals in office scene -->
  <defs>
    <style>
      .animal { fill: #F4A460; }
      .office { fill: #E0E0E0; }
      .accent { fill: #45A117; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="#fafafa"/>

  <!-- Office desk area -->
  <rect class="office" x="100" y="250" width="400" height="150" rx="8"/>

  <!-- Medical cross icon -->
  <g class="accent">
    <rect x="250" y="100" width="30" height="100"/>
    <rect x="210" y="140" width="100" height="30"/>
  </g>

  <!-- Cat on left -->
  <ellipse class="animal" cx="150" cy="200" rx="40" ry="50"/>
  <polygon class="animal" points="140,150 150,130 160,150"/>

  <!-- Horse on right -->
  <ellipse class="animal" cx="450" cy="180" rx="50" ry="60"/>
  <polygon class="animal" points="440,120 450,80 460,120"/>

  <!-- Pig in center -->
  <ellipse class="animal" cx="300" cy="280" rx="45" ry="55"/>
  <circle class="animal" cx="290" cy="270" r="8"/>
  <circle class="animal" cx="310" cy="270" r="8"/>

  <!-- Decorative elements -->
  <rect class="accent" x="120" y="150" width="20" height="20" rx="4" opacity="0.3"/>
  <circle class="accent" cx="480" cy="200" r="15" opacity="0.3"/>
</svg>
